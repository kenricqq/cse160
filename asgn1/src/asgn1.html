<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Change a point color</title>
		<script src="../lib/webgl-utils.js"></script>
		<script src="../lib/webgl-debug.js"></script>
		<script src="../lib/cuon-utils.js"></script>
		<script src="asgn1.js"></script>
	</head>

	<body onload="main()">
		<canvas id="webgl" width="400" height="400">
			Please use a browser that supports "canvas"
		</canvas>
		<img id="refImg"
		     src="./ref.jpg"
		     alt="reference kt image"
		     style="width: 400px; height: 400px; transform: rotate(-90deg);
 object-fit: contain;"
		     hidden
		>

		<div>
			<button id="clearCanvas">Clear Canvas</button>
		</div>

		<div>
			<h3>Drawing Mode:</h3>
			<button id="square">Squares</button>
			<button id="triangle">Triangles</button>
			<button id="circle">Circles</button>
		</div>

		<div>
			<h3>Shape Color:</h3>
			<label for="redSlider">Red</label>
			<input type="range" id="redSlider" name="redSlider" min="0" max="20">
			<label for="greenSlider">Green</label>
			<input type="range" id="greenSlider" name="greenSlider" min="0" max="20">
			<label for="blueSlider">Blue</label>
			<input type="range" id="blueSlider" name="blueSlider" min="0" max="20">
		</div>

		<div>
			<h3>More Settings:</h3>
			<label for="shapeSize">Shape Size</label>
			<input type="range" id="shapeSize" name="shapeSize" min="1" max="20">
			<label for="segmentCount">(Circles) Segment Count</label>
			<input type="range" id="segmentCount" name="segmentCount" min="3" max="50">
			<label for="rotation">Rotation</label>
			<input type="range" id="rotation" name="rotation" min="-10" max="9">
		</div>

		<div>
			<h3>KT Special:</h3>
			<button id="special">Try it out!</button>
		</div>
	</body>
</html>
